
algorithm: PPO
seed: ${seed}
checkpoint: ${checkpoint}
normalize_state: False

policy:
  std_0: 1.
  n_features: [256, 128, 64]
  activation: leaky_relu

critic:
  n_features: [256, 128, 64]
  activation: leaky_relu
  batch_size: 1536 # 256 * 6
  optimizer:
    params:
      lr: 3e-4

actor_opt:
  params:
    lr: 3e-4

params:
  n_epochs_policy: 5
  batch_size: 1536 # 256 * 6
  eps_ppo: 0.2
  lam: 0.95
  ent_coeff: 0.0
  critic_fit_params:

  
  

