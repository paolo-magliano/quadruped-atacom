
# Task name - used to pick the class to load
task_name: A1

# if set to positive integer, overrides the default number of environments
num_envs: 2048

# seed - set to -1 to choose random seed
seed: 1
# set to True for deterministic performance
torch_deterministic: False

n_epochs: 30
horizon: 1000
quiet: False
render: False
record: False
learn:
  n_steps: 4915200 # 4096 * 24 * 50
  n_steps_per_fit: 49152 # 2048 * 24
  quiet: ${quiet}

env_type: 'PD' # PD or PI

## Device config
physics_engine: 'physx'
# whether to use cpu or gpu pipeline
pipeline: 'gpu'
# whether to use cpu or gpu physx
sim_device: 'gpu'
# used for gpu simulation only - device id for running sim and task if pipeline=gpu
device_id: 0
# device to run RL
rl_device: 'cuda:0'
# multi-GPU training
multi_gpu: False

## PhysX arguments
num_threads: 4 # Number of worker threads used by PhysX - for CPU PhysX only.
solver_type: 1 # 0: pgs, 1: tgs

# MushroomRL arguments
# test - if set, run policy in inference mode (requires setting checkpoint to load)
test: False
# used to set checkpoint path
checkpoint: ''
# evaluate checkpoint
complete_eval: True
eval:
  n_episodes: 256
  # n_steps: 409600
  quiet: ${quiet}
  render: ${render}
  record: ${record}

# Set to enable debugging
debug: False 

# disables rendering
headless: True
# enables native livestream
enable_livestream: False
# timeout for MT script
mt_timeout: 300
# Warp
warp: False

# ATACOM Parameters
atacom:
  enable: True 
  slack_dynamics_type: 'exp'
  slack_beta: 50
  slack_tol: 1e-6
  randomize_dynamics: False
  double_integration: False
  drift_compensation_type: 'vanilla'
  drift_clipping: True

constraints:
  joint_limit: [1.]
  feet: # ['FL', 'FR', 'RL', 'RR']

urdf_filepath: 

results_dir: './logs'
wandb:
  activate: True
  key: '64d1b8769f524f18c3c9c53265dbde91917f7cac'  #YOUR_WANDB_API
  group: ''
  name: '${task_name}_${seed}'
  entity: 'paolo_magliano'
  project: 'ATACOM_${task_name}'

# set default task and default training config based on task
defaults:
  - _self_
  # - task: A1
  - train: A1PPO
  - override hydra/job_logging: disabled

# set the directory where the output files get saved
hydra:
  output_subdir: null
  run:
    dir: .

