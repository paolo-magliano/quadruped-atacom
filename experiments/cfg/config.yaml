# Task/environment name
task_name: A1

# Number of parallel environments
num_envs: 4096

# Random seed
seed: [0]

n_epochs: 15
horizon: 1000

quiet: False
render: False
record: False

learn:
  n_steps: 4915200 # 4096 * 24 * 50
  n_steps_per_fit: 98304 # 4096 * 24
  quiet: ${quiet}

control:
  # Low-level controller used to map the policy action to joint torques.
  #
  # Pos:
  #   Action = target joint positions.
  #   A PD controller tracks the target positions.
  #   ATACOM cannot be used in this mode.
  #
  # Vel:
  #   Action = target joint velocities.
  #   Velocities are integrated into target joint positions,
  #   then tracked with the same PD controller as in Pos mode.
  #
  # PID:
  #   Action = target joint velocities.
  #   A PID controller directly tracks the velocity targets.
  type: 'PID'

  # Scaling applied to the policy action before the controller
  action_scale: 2.5

  # Controller gains used in PID controller
  Kp: [1.]
  Kd: [0.]
  Ki: [0.1]

# Run in inference mode only
test: False

# Checkpoint path to load
checkpoint: ''

# Log each constraint dimension separately
deep_constr_log: False

eval:
  n_episodes: 256
  # n_steps: 409600
  quiet: ${quiet}
  render: ${render}
  record: ${record}

debug: False
headless: True

atacom:
  enable: True
  slack_dynamics_type: 'exp'
  slack_beta: 10
  slack_tol: 1e-6
  randomize_dynamics: False
  double_integration: False
  drift_compensation_type: 'vanilla'
  drift_clipping: True

  # Enable directional constraints:
  # only constraints approached with negative derivative are enforced
  directional_constraint: True

  # Error compensation strategy
  advance_ec: 'ema' # '', 'integral' or 'ema'

  # Gain of the base constraint correction term
  lambda_c: 2.

  # Integral correction gain
  lambda_integral: 0.5

  # Window used by the ema error correction
  integral_window: 100

constraints:
  # If False, joint limits are absolute offsets from the default pose:
  #   q_default ± joint_limit
  # If True, they are interpreted relative to each joint range.
  joint_percentage: False

  # Symmetric position limit for the 3 leg joints
  joint_limit: # [1., 1., 1.]

  # Position limit applied only to the HFE joint
  hfe_limit: # [0.5]

  # Feet where foot-position constraints are active
  # FL = front-left, FR = front-right, RL = rear-left, RR = rear-right
  feet_pos: ['FL', 'FR', 'RL', 'RR']

  # Semi-axes of the allowed foot-position ellipse around the default pose
  foot_pos_alpha: # 0.5
  foot_pos_beta: # 0.5

  # Vertical foot-position bounds relative to the base
  foot_pos_max_z_height: # 0.4
  foot_pos_min_z_height: 0.1

  # Reference foot orientation(s) expressed in axis-angle form.
  # Can be one orientation for all feet or one per foot.
  foot_rot_base: # '[[0., 0., 0.]]'

  # Allowed foot orientation range.
  # The closer the foot is to the ground, the more the bound shrinks
  # from foot_rot_max to foot_rot_min.
  foot_rot_max: 1.57
  foot_rot_min: # 0.8

  # Numerically check the Jacobian of each constraint (slow)
  check_J: False

# Path to the robot URDF if not in the default position
urdf_filepath:

results_dir: './logs'
experiment_subdir: ''

plot:
  compare_paths: [] 

wandb:
  activate: True
  key: ''  # YOUR_WANDB_API
  group: ''
  name: '${task_name}_${seed}'
  entity: 'paolo_magliano'
  project: 'ATACOM_${task_name}'

train:
  algorithm: PPO
  seed: ${seed}
  checkpoint: ${checkpoint}
  normalize_state: False
  atacom_policy: False

  policy:
    std_0: 1.
    mean_n_features: [512, 256, 128]
    std_n_features: [128, 64, 32]
    activation: relu

  critic:
    n_features: [512, 256, 128]
    activation: relu
    batch_size: 6144 # 4096 * 24 / 16
    optimizer:
      params:
        lr: 1e-3

  actor_opt:
    params:
      lr: 1e-3

  params:
    n_epochs_policy: 5
    batch_size: 6144 # 4096 * 24 / 16
    eps_ppo: 0.2
    lam: 0.95
    ent_coeff: 1e-3
    ent_decay: 0.
    schedule: 'adaptive' # adaptive or fixed
    desired_kl: 0.01
    clip_grad_norm: 1. 

# Set the directory where the output files get saved
hydra:
  output_subdir: null
  run:
    dir: .


