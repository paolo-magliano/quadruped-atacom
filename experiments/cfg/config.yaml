
# Task name - used to pick the class to load
task_name: A1

# if set to positive integer, overrides the default number of environments
num_envs: 4096

# seed - set to -1 to choose random seed
seed: 1

n_epochs: 15
horizon: 1000

quiet: False
render: False
record: False

learn:
  n_steps: 4915200 # 4096 * 24 * 50
  n_steps_per_fit: 98304 # 4096 * 24
  quiet: ${quiet}

control:
  type: 'PI' # PD or PI
  action_scale: 3.5
  Kp: 1.
  Kd: 0.
  Ki: 0.1

  # type: 'PD' # PD or PI
  # action_scale: 3.
  # Kp: 0.
  # Kd: 10.
  # Ki: 0.

# MushroomRL arguments
# test - if set, run policy in inference mode (requires setting checkpoint to load)
test: False
# used to set checkpoint path
checkpoint: ''
# evaluate checkpoint
complete_eval: True
deep_constr_log: False
plot_actions: False

eval:
  n_episodes: 256
  # n_steps: 409600
  quiet: ${quiet}
  render: ${render}
  record: ${record}

# Set to enable debugging
debug: False 

# disables rendering
headless: True
# enables native livestream

# ATACOM Parameters
atacom:
  enable: True 
  slack_dynamics_type: 'exp'
  slack_beta: 50
  slack_tol: 1e-6
  randomize_dynamics: False
  double_integration: False
  drift_compensation_type: 'vanilla'
  drift_clipping: True

constraints:
  joint_limit: [1.]
  feet: # ['FL', 'FR', 'RL', 'RR']
  # Activate the numerical control of the jacobian of all contraints. It slow down the execution
  check_J: False

urdf_filepath: 

results_dir: './logs'
wandb:
  activate: True
  key: '64d1b8769f524f18c3c9c53265dbde91917f7cac'  #YOUR_WANDB_API
  group: ''
  name: '${task_name}_${seed}'
  entity: 'paolo_magliano'
  project: 'ATACOM_${task_name}'

train:
  algorithm: PPO
  seed: ${seed}
  checkpoint: ${checkpoint}
  normalize_state: False

  policy:
    std_0: 1.
    n_features: [512, 256, 128]
    activation: relu

  critic:
    n_features: [512, 256, 128]
    activation: relu
    batch_size: 6155 # 4096 * 24 / 16
    optimizer:
      params:
        lr: 1e-3

  actor_opt:
    params:
      lr: 1e-3

  params:
    atacom_enable: ${atacom.enable}
    n_epochs_policy: 5
    batch_size: 6144 # 4096 * 24 / 16
    eps_ppo: 0.2
    lam: 0.95
    ent_coeff: 1e-4 # 0.01 for Nikita, 5e-4 for PD and 1e-4 for PI
    ent_decay: 0.
    schedule: 'adaptive' # could be adaptive, fixed
    desired_kl: 0.01
    clip_grad_norm: 1. 


# set the directory where the output files get saved
hydra:
  output_subdir: null
  run:
    dir: .

