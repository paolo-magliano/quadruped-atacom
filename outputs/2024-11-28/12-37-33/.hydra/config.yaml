task_name: ${task.name}
num_envs: 256
seed: 0
torch_deterministic: false
n_epochs: 1000
quiet: true
learn:
  n_steps: 98304
  n_steps_per_fit: 6144
  quiet: ${quiet}
physics_engine: physx
pipeline: gpu
sim_device: gpu
device_id: 0
rl_device: cuda:0
multi_gpu: false
num_threads: 4
solver_type: 1
test: true
checkpoint: /home/magliano/Project/SafeLocomotion/logs/Anymal_2024-11-28-12-20-16
eval:
  n_episodes: 5
  quiet: ${quiet}
debug: false
headless: false
enable_livestream: false
mt_timeout: 300
warp: false
enable_recording: false
recording_interval: 2000
recording_length: 100
recording_fps: 30
recording_dir: ''
atacom:
  slack_dynamics_type: exp
  slack_beta: 2
  slack_tol: 1.0e-06
  randomize_dynamics: false
  double_integration: false
  drift_compensation_type: vanilla
  drift_clipping: true
results_dir: ./logs
wandb:
  activate: false
  key: ''
  group: ''
  name: ${task.name}_${seed}
  entity: paolo_magliano
  project: ATACOM_${task.name}
task:
  name: Anymal
  physics_engine: ${..physics_engine}
  env:
    numEnvs: ${resolve_default:4096,${...num_envs}}
    envSpacing: 4.0
    clipObservations: 5.0
    clipActions: 1.0
    controlFrequencyInv: 2
    baseInitState:
      pos:
      - 0.0
      - 0.0
      - 0.62
      rot:
      - 0.0
      - 0.0
      - 0.0
      - 1.0
      vLinear:
      - 0.0
      - 0.0
      - 0.0
      vAngular:
      - 0.0
      - 0.0
      - 0.0
    randomCommandVelocityRanges:
      linear_x:
      - -2.0
      - 2.0
      linear_y:
      - -1.0
      - 1.0
      yaw:
      - -1.0
      - 1.0
    control:
      stiffness: 85.0
      damping: 2.0
      actionScale: 13.5
    defaultJointAngles:
      LF_HAA: 0.03
      LH_HAA: 0.03
      RF_HAA: -0.03
      RH_HAA: -0.03
      LF_HFE: 0.4
      LH_HFE: -0.4
      RF_HFE: 0.4
      RH_HFE: -0.4
      LF_KFE: -0.8
      LH_KFE: 0.8
      RF_KFE: -0.8
      RH_KFE: 0.8
    learn:
      linearVelocityXYRewardScale: 1.0
      angularVelocityZRewardScale: 0.5
      linearVelocityZRewardScale: -0.03
      jointAccRewardScale: -0.0003
      actionRateRewardScale: -0.006
      cosmeticRewardScale: -0.06
      linearVelocityScale: 2.0
      angularVelocityScale: 0.25
      dofPositionScale: 1.0
      dofVelocityScale: 0.05
      episodeLength_s: 50
  sim:
    dt: 0.01
    use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
    gravity:
    - 0.0
    - 0.0
    - -9.81
    add_ground_plane: true
    add_distant_light: false
    use_fabric: true
    enable_scene_query_support: false
    disable_contact_processing: false
    enable_cameras: false
    default_physics_material:
      static_friction: 1.0
      dynamic_friction: 1.0
      restitution: 0.0
    physx:
      worker_thread_count: ${....num_threads}
      solver_type: ${....solver_type}
      use_gpu: ${eq:${....sim_device},"gpu"}
      solver_position_iteration_count: 4
      solver_velocity_iteration_count: 1
      contact_offset: 0.02
      rest_offset: 0.0
      bounce_threshold_velocity: 0.2
      friction_offset_threshold: 0.04
      friction_correlation_distance: 0.025
      enable_sleeping: true
      enable_stabilization: true
      max_depenetration_velocity: 100.0
      gpu_max_rigid_contact_count: 524288
      gpu_max_rigid_patch_count: 163840
      gpu_found_lost_pairs_capacity: 4194304
      gpu_found_lost_aggregate_pairs_capacity: 33554432
      gpu_total_aggregate_pairs_capacity: 4194304
      gpu_max_soft_body_contacts: 1048576
      gpu_max_particle_contacts: 1048576
      gpu_heap_capacity: 134217728
      gpu_temp_buffer_capacity: 33554432
      gpu_max_num_partitions: 8
    Anymal:
      override_usd_defaults: false
      enable_self_collisions: false
      enable_gyroscopic_forces: true
      solver_position_iteration_count: 4
      solver_velocity_iteration_count: 1
      sleep_threshold: 0.005
      stabilization_threshold: 0.001
      density: -1
      max_depenetration_velocity: 100.0
train:
  algorithm: PPO
  seed: ${seed}
  checkpoint: ${checkpoint}
  normalize_state: false
  policy:
    std_0: 1.0
    n_features:
    - 256
    - 128
    - 64
    activation: leaky_relu
  critic:
    n_features:
    - 256
    - 128
    - 64
    activation: leaky_relu
    batch_size: 1536
    optimizer:
      params:
        lr: 0.0003
  actor_opt:
    params:
      lr: 0.0003
  params:
    n_epochs_policy: 5
    batch_size: 1536
    eps_ppo: 0.2
    lam: 0.95
    ent_coeff: 0.0
    critic_fit_params: null
